  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"uk\"><head>\n\n\n<meta charset=\"utf-8\">\n<title>Telegram Bot — Як це працює<\u002Ftitle>\n\n<script src=\"76326543-5c2c-426e-b8e0-bbf563a1c4bb\"><\u002Fscript>\n<style>\n  :root {\n    /* type scale (1920x1080) */\n    --type-title: 72px;\n    --type-h2: 56px;\n    --type-subtitle: 42px;\n    --type-body: 32px;\n    --type-small: 26px;\n    --type-tiny: 24px;\n    --type-code: 26px;\n    --type-mega: 180px;\n\n    /* spacing */\n    --pad-x: 110px;\n    --pad-top: 96px;\n    --pad-bottom: 96px;\n    --gap-title: 56px;\n    --gap-item: 28px;\n\n    /* colors */\n    --bg: #ffffff;\n    --bg-soft: #f6f8fb;\n    --bg-tint: #eaf4fb;\n    --ink: #0f172a;\n    --ink-2: #475569;\n    --ink-3: #94a3b8;\n    --line: #e2e8f0;\n    --line-2: #cbd5e1;\n    --tg: #0088cc;\n    --tg-dark: #006aa3;\n    --tg-light: #5cb4e1;\n    --warn: #c2410c;\n    --ok: #15803d;\n\n    --mono: \"SF Mono\", \"JetBrains Mono\", Menlo, Consolas, monospace;\n    --sans: \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n  }\n\n  html, body { margin: 0; padding: 0; background: #0a0a0a; }\n  body { font-family: var(--sans); color: var(--ink); }\n\n  deck-stage > section {\n    background: var(--bg);\n    color: var(--ink);\n    box-sizing: border-box;\n    padding: var(--pad-top) var(--pad-x) var(--pad-bottom);\n    display: flex;\n    flex-direction: column;\n    overflow: hidden;\n    font-feature-settings: \"ss01\", \"cv11\";\n  }\n\n  /* shared atoms */\n  .eyebrow {\n    font-size: var(--type-small);\n    color: var(--tg);\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    font-weight: 600;\n  }\n  .h1 {\n    font-size: var(--type-h2);\n    font-weight: 700;\n    line-height: 1.04;\n    letter-spacing: -0.025em;\n    margin: 0;\n  }\n  .h-title {\n    font-size: var(--type-title);\n    font-weight: 700;\n    line-height: 1;\n    letter-spacing: -0.03em;\n    margin: 0;\n  }\n  .subtitle {\n    font-size: var(--type-subtitle);\n    line-height: 1.18;\n    color: var(--ink-2);\n    font-weight: 400;\n    letter-spacing: -0.015em;\n    margin: 0;\n    text-wrap: balance;\n  }\n  .body {\n    font-size: var(--type-body);\n    line-height: 1.4;\n    color: var(--ink);\n    margin: 0;\n    text-wrap: pretty;\n  }\n  .small {\n    font-size: var(--type-small);\n    line-height: 1.35;\n    color: var(--ink-2);\n    margin: 0;\n  }\n  .mono { font-family: var(--mono); }\n  .accent { color: var(--tg); }\n  .muted { color: var(--ink-2); }\n  .quiet { color: var(--ink-3); }\n\n  .topbar {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    margin-bottom: var(--gap-title);\n  }\n  .topbar .eyebrow { font-size: var(--type-tiny); }\n  .topbar .nav-num {\n    font-size: var(--type-tiny);\n    color: var(--ink-3);\n    font-family: var(--mono);\n    letter-spacing: 0.05em;\n  }\n\n  /* slide title row */\n  .slide-title-row {\n    display: flex;\n    align-items: baseline;\n    gap: 32px;\n    margin-bottom: var(--gap-title);\n  }\n  .slide-title-row .num {\n    font-size: var(--type-small);\n    font-family: var(--mono);\n    color: var(--tg);\n    letter-spacing: 0.05em;\n    flex-shrink: 0;\n  }\n\n  /* TITLE SLIDE */\n  .title-slide {\n    background: var(--bg);\n    justify-content: space-between;\n  }\n  .title-mark {\n    width: 88px; height: 88px;\n    border-radius: 50%;\n    background: var(--tg);\n    position: relative;\n  }\n  .title-mark::after {\n    content: \"\";\n    position: absolute;\n    inset: 28px 24px 28px 32px;\n    background: var(--bg);\n    clip-path: polygon(0 50%, 100% 0, 70% 50%, 100% 100%);\n  }\n  .title-main {\n    font-size: 132px;\n    line-height: 0.98;\n    letter-spacing: -0.035em;\n    font-weight: 700;\n    margin: 0;\n  }\n  .title-meta {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-end;\n    font-size: var(--type-small);\n    color: var(--ink-2);\n  }\n  .title-meta .col { display: flex; flex-direction: column; gap: 8px; }\n  .title-meta .label {\n    font-size: var(--type-tiny);\n    color: var(--ink-3);\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n  }\n\n  /* generic content shells */\n  .content {\n    flex: 1;\n    display: flex;\n    flex-direction: column;\n    gap: var(--gap-title);\n    min-height: 0;\n  }\n  .two-col {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 72px;\n    flex: 1;\n    min-height: 0;\n  }\n  .two-col.wide-left { grid-template-columns: 1.2fr 1fr; }\n  .two-col.wide-right { grid-template-columns: 1fr 1.4fr; }\n\n  /* node — used in flow diagrams */\n  .node {\n    background: var(--bg);\n    border: 2px solid var(--ink);\n    border-radius: 12px;\n    padding: 24px 32px;\n    display: inline-flex;\n    flex-direction: column;\n    gap: 6px;\n    min-width: 220px;\n    box-shadow: 6px 6px 0 var(--ink);\n  }\n  .node.tg-fill {\n    background: var(--tg);\n    border-color: var(--tg-dark);\n    color: white;\n    box-shadow: 6px 6px 0 var(--tg-dark);\n  }\n  .node.soft {\n    background: var(--bg-soft);\n    border-color: var(--line-2);\n    box-shadow: 4px 4px 0 var(--line-2);\n  }\n  .node-label {\n    font-size: var(--type-small);\n    font-weight: 600;\n    line-height: 1.1;\n  }\n  .node-sub {\n    font-size: var(--type-tiny);\n    color: var(--ink-2);\n    line-height: 1.2;\n    font-family: var(--mono);\n  }\n  .node.tg-fill .node-sub { color: rgba(255,255,255,0.85); }\n\n  /* arrow */\n  .arrow {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 4px;\n    color: var(--tg);\n  }\n  .arrow.h { flex-direction: row; }\n  .arrow .line {\n    background: var(--ink);\n    border-radius: 2px;\n  }\n  .arrow.v .line { width: 3px; height: 60px; }\n  .arrow.h .line { height: 3px; width: 80px; }\n  .arrow .tip {\n    width: 0; height: 0;\n    border-left: 8px solid transparent;\n    border-right: 8px solid transparent;\n  }\n  .arrow.v .tip { border-top: 14px solid var(--ink); }\n  .arrow.h .tip-r {\n    width: 0; height: 0;\n    border-top: 8px solid transparent;\n    border-bottom: 8px solid transparent;\n    border-left: 14px solid var(--ink);\n  }\n  .arrow .lbl {\n    font-size: var(--type-tiny);\n    font-family: var(--mono);\n    color: var(--ink-2);\n    background: var(--bg);\n    padding: 2px 8px;\n    white-space: nowrap;\n  }\n\n  /* code blocks */\n  .code {\n    background: #0f172a;\n    color: #e2e8f0;\n    border-radius: 12px;\n    padding: 28px 32px;\n    font-family: var(--mono);\n    font-size: var(--type-code);\n    line-height: 1.45;\n    overflow: hidden;\n    white-space: pre;\n    tab-size: 2;\n  }\n  .code .kw { color: #c084fc; }\n  .code .fn { color: #60a5fa; }\n  .code .str { color: #86efac; }\n  .code .com { color: #64748b; font-style: italic; }\n  .code .dec { color: #fbbf24; }\n  .code .var { color: #f0abfc; }\n\n  /* tag */\n  .tag {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    padding: 6px 14px;\n    border: 1.5px solid var(--ink);\n    border-radius: 999px;\n    font-size: var(--type-tiny);\n    font-family: var(--mono);\n    color: var(--ink);\n  }\n  .tag.tg { border-color: var(--tg); color: var(--tg); }\n  .tag.ok { border-color: var(--ok); color: var(--ok); }\n  .tag.warn { border-color: var(--warn); color: var(--warn); }\n\n  /* footer slide number style */\n  .deck-slide-overlay { font-family: var(--mono) !important; }\n<\u002Fstyle>\n<\u002Fhead>\n<body style=\"\">\n\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Вітаю на уроці 46! Сьогодні розберемо, як насправді працює Telegram-бот — не на рівні tutorial-копіпасти, а на рівні системного розуміння. Після цієї лекції ви зрозумієте, чому aiogram має ту архітектуру, яку має, і чому без asyncio боти не існують. Це урок-фундамент для всього модуля.\",\n  \"Перше і найважливіше непорозуміння: Telegram-бот це не програма всередині Telegram. Це звичайний backend-сервер, який живе на вашому VPS або ноутбуці. Telegram-сервери виступають посередником: вони беруть на себе MTProto-шифрування, мільйони з'єднань, доставку. Ви пишете звичайний Python.\",\n  \"Щоб закріпити модель, ось аналогія з ресторанною кухнею. Telegram API — це офіціант, який приймає замовлення. Update — це квиток з замовленням. Dispatcher — шеф-кухар, який вирішує, кому це передати. Фільтри — спеціалізація цехів. Handler — кухар, який готує відповідь. Цю схему ви побачите скрізь у backend-розробці.\",\n  \"Дивимось на реальну топологію. Користувач говорить з Telegram-клієнтом через MTProto — це їхній закритий протокол. Telegram-сервери говорять з вашим ботом через звичайний HTTPS Bot API. Тобто ви ніколи не торкаєтесь MTProto — для вас це просто REST-запити.\",\n  \"Update — це JSON-конверт, у якому Telegram надсилає вам будь-яку подію. Усередині може бути message, callback_query від кнопки, або pre_checkout_query якщо хтось оплачує. aiogram парсить цей JSON у Pydantic-об'єкти, з якими ви працюєте у коді.\",\n  \"Тепер — як саме події потрапляють до бота. Є два підходи, і вибір між ними — це перше архітектурне рішення, яке ви прийматимете. Polling і Webhook. Розберемо обидва.\",\n  \"Long Polling: бот сам активно запитує Telegram через метод getUpdates. Telegram тримає з'єднання до 30 секунд — якщо за цей час хтось щось напише, відповідає одразу. Якщо ні — повертає порожній список, і бот робить новий запит. Працює локально, не треба домен, не треба SSL. Ідеально для розробки.\",\n  \"Webhook: ролі змінюються. Ви один раз кажете Telegram «надсилай події сюди», і далі Telegram сам стукає у ваш сервер кожного разу, коли щось відбувається. Миттєва доставка, масштабується горизонтально, але потрібен публічний домен і SSL-сертифікат. Це шлях для production.\",\n  \"Ось коли що обирати. Polling — для розробки, локального тестування, малих ботів до тисячі користувачів. Webhook — коли йдете у production, треба мінімальну затримку, треба декілька інстансів за балансером. Правило: починаєте з polling, переходите на webhook тоді, коли бот реально цього потребує. Не оптимізуйте передчасно.\",\n  \"Тепер найголовніший слайд лекції. Що відбувається з Update всередині бота. Це pipeline: спочатку зовнішні middleware (наприклад, перевірка бану), потім Dispatcher, який віддає Update у каскад роутерів. Перший роутер, чий фільтр повернув True, споживає подію. Далі — внутрішні middleware (DB-сесія), і нарешті Handler виконує вашу бізнес-логіку.\",\n  \"Dispatcher — це кореневий маршрутизатор. У нього включені роутери. Роутер — це група handler'ів, об'єднаних за доменом: один роутер для команд, інший для каталогу, третій для оформлення замовлення. Ви не пишете один файл з усім кодом — ви розбиваєте бота на модулі.\",\n  \"Фільтр — це питання, яке роутер задає кожному Update. Наприклад: «це команда start?», «це фото?», «це текст, що дорівнює певному рядку?». Фільтри перевіряються зверху вниз. Як тільки один повернув True — Update йде у відповідний handler, решта пропускається.\",\n  \"І ось критичний момент. Порядок реєстрації фільтрів має значення. Якщо ви поставите широкий фільтр F.text першим, він спіймає геть усе, включно з командою /help — і ваш обробник /help ніколи не виконається. Правило просте: специфічні фільтри вище, широкі — нижче. Catch-all — в самому кінці.\",\n  \"Тепер про asyncio. Чому це обов'язкова частина роботи з ботами. Уявіть тисячу користувачів одночасно. Якщо ваш код синхронний — десятий у черзі чекає, поки бот закінчить обслуговувати перших дев'ятьох. Це неприйнятно. Async дозволяє одному процесу обслуговувати усіх паралельно.\",\n  \"Дивимось на timeline. Користувач A викликає повільну операцію — handler пише await і Event Loop переключається. Користувач B і C отримують відповідь миттєво. Коли операція для A завершилась — Event Loop повертається до A. Один процес, нуль потоків, ніхто нікого не блокує.\",\n  \"А ось як це зламати. time.sleep, requests.get, важкі CPU-обчислення прямо у handler — це блокування. Event Loop стоїть. Усі інші користувачі чекають. Правило: все, що робить I/O, має бути асинхронним. Замість requests — aiohttp, замість psycopg2 — asyncpg, замість time.sleep — asyncio.sleep.\",\n  \"FSM — Finite State Machine. Це механізм, який запам'ятовує контекст діалогу. Без FSM бот не розуміє, чому раптом ви пишете «Іван» — він не пам'ятає, що секунду тому запитав ім'я. FSM зберігає стан кожного користувача окремо і дозволяє будувати багатокрокові форми: реєстрацію, замовлення, опитування.\",\n  \"Як виглядає шлях від нуля до робочого бота. Чотири кроки. У @BotFather взяти токен. Поставити aiogram. Написати handler — буквально п'ять рядків. Запустити polling. Усе. За пів години у вас працює перший бот.\",\n  \"Що з цим взагалі можна робити. Боти-магазини з оплатою через Telegram Stars. AI-асистенти на OpenAI. Запис на послуги — заміна сайту перукарні. Медіа-обробка — фото, відео, аудіо. Inline-боти, які працюють у будь-якому чаті. Модерація спільнот. Бізнес-моделі — від донатів до B2B SaaS.\",\n  \"І нарешті, шлях масштабування. Починаємо з polling на ноутбуці. Виходимо у малий production з RedisStorage. Далі webhook + FastAPI + декілька інстансів за Nginx. На великому масштабі — Kubernetes, Redis Cluster, Celery, моніторинг. Кожен крок виправданий тільки тоді, коли трафік цього вимагає. На сьогодні все. Питання — у студії.\"\n]\n<\u002Fscript>\n\n<deck-stage width=\"1920\" height=\"1080\" style=\"--deck-rail-w: 188px;\">\n\n  <!-- ============ 01 — TITLE ============ -->\n  <section data-label=\"01 Title\" class=\"title-slide\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n      <div class=\"title-mark\"><\u002Fdiv>\n      <div style=\"text-align:right;\">\n        <div class=\"eyebrow\" style=\"font-size:var(--type-tiny);\">Модуль 5 · APIs, Bots &amp; Production<\u002Fdiv>\n        <div class=\"small mono\" style=\"margin-top:8px; color:var(--ink-3);\">УРОК 46<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div class=\"eyebrow\" style=\"margin-bottom:32px;\">Вступна лекція<\u002Fdiv>\n      <h1 class=\"title-main\">Як працює<br><span style=\"color:var(--tg);\">Telegram-бот<\u002Fspan><\u002Fh1>\n      <p class=\"subtitle\" style=\"margin-top:48px; max-width:1100px;\">\n        Від HTTPS-запиту до event-driven backend — системна картина для першого бота на&nbsp;<span class=\"mono\">aiogram&nbsp;3.x<\u002Fspan>.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"title-meta\">\n      <div class=\"col\">\n        <span class=\"label\">Час<\u002Fspan>\n        <span class=\"mono\">30–40 хвилин · 20 слайдів<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"col\">\n        <span class=\"label\">Рівень<\u002Fspan>\n        <span class=\"mono\">Beginner → Intermediate<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"text-align:right;\">\n        <span class=\"label\">Стек<\u002Fspan>\n        <span class=\"mono\">Python · aiogram · asyncio<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 02 — SYSTEM PICTURE ============ -->\n  <section data-label=\"02 System Picture\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">02<\u002Fspan>\n      <h2 class=\"h1\">Системна картина<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"two-col wide-left\">\n      <div style=\"display: flex; flex-direction: column; gap: 28px;\">\n        <p class=\"body\" style=\"font-size:38px; line-height:1.3;\">\n          Telegram-бот — це <span class=\"accent\" style=\"font-weight:600;\">не програма всередині Telegram<\u002Fspan>.\n          Це звичайний backend-сервер на вашій машині.\n        <\u002Fp>\n\n        <div style=\"display:flex; flex-direction:column; gap:18px;\">\n          <div style=\"display:flex; gap:18px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:60px; font-size:26px; font-weight:600;\">01<\u002Fspan>\n            <div>\n              <div class=\"body\" style=\"font-size:28px; font-weight:600; margin-bottom:4px;\">Де він живе<\u002Fdiv>\n              <div class=\"small\">VPS, Docker-контейнер, хмарний хост — або просто ваш ноутбук для розробки. Telegram байдуже де.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:18px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:60px; font-size:26px; font-weight:600;\">02<\u002Fspan>\n            <div>\n              <div class=\"body\" style=\"font-size:28px; font-weight:600; margin-bottom:4px;\">Що робить Telegram<\u002Fdiv>\n              <div class=\"small\">MTProto-шифрування, мільйони одночасних клієнтів, доставка повідомлень, хранення файлів. Ви цього ніколи не торкаєтеся.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:18px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:60px; font-size:26px; font-weight:600;\">03<\u002Fspan>\n            <div>\n              <div class=\"body\" style=\"font-size:28px; font-weight:600; margin-bottom:4px;\">Як відбувається розмова<\u002Fdiv>\n              <div class=\"small\">Звичайні HTTPS-запити до <span class=\"mono\">api.telegram.org/bot{token}<\u002Fspan>. JSON туди, JSON назад.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:18px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:60px; font-size:26px; font-weight:600;\">04<\u002Fspan>\n            <div>\n              <div class=\"body\" style=\"font-size:28px; font-weight:600; margin-bottom:4px;\">Що пишете ви<\u002Fdiv>\n              <div class=\"small\">Бізнес-логіку, взаємодію з БД, інтеграції. Решту робить <span class=\"mono\">aiogram<\u002Fspan> — ваш async-фреймворк.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:14px; flex-wrap:wrap; margin-top:8px;\">\n          <span class=\"tag tg\">aiogram 3.x<\u002Fspan>\n          <span class=\"tag\">asyncio<\u002Fspan>\n          <span class=\"tag\">HTTPS / REST<\u002Fspan>\n          <span class=\"tag\">event-driven<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;\">\n        <div class=\"node soft\" style=\"min-width:340px; text-align:center;\">\n          <div class=\"node-label\">Користувач<\u002Fdiv>\n          <div class=\"node-sub\">Telegram Client — iOS / Web<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"arrow v\"><span class=\"lbl\">MTProto<\u002Fspan><div class=\"line\"><\u002Fdiv><div class=\"tip\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"node tg-fill\" style=\"min-width:340px; text-align:center;\">\n          <div class=\"node-label\">Telegram Servers<\u002Fdiv>\n          <div class=\"node-sub\">посередник · CDN · auth<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"arrow v\"><span class=\"lbl\">HTTPS Bot API<\u002Fspan><div class=\"line\"><\u002Fdiv><div class=\"tip\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"node\" style=\"min-width:340px; text-align:center;\">\n          <div class=\"node-label\">Ваш Python-сервер<\u002Fdiv>\n          <div class=\"node-sub\">async def echo(message): ...<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 03 — KITCHEN ANALOGY ============ -->\n  <section data-label=\"03 Kitchen Analogy\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">03<\u002Fspan>\n      <h2 class=\"h1\">Аналогія — ресторанна кухня<\u002Fh2>\n    <\u002Fdiv>\n\n    <p class=\"subtitle\" style=\"margin-bottom:28px; max-width:1500px;\">\n      Та сама патерн-схема, яку ви побачите у будь-якому backend: офіціант приймає, диспетчер розподіляє, кухар готує.\n    <\u002Fp>\n\n    <div style=\"display:grid; grid-template-columns: 1fr 70px 1.15fr; gap:0; align-items:stretch; flex:1; min-height:0;\">\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <div class=\"eyebrow\" style=\"color:var(--ink-3); margin-bottom:2px;\">Ресторан<\u002Fdiv>\n        <div class=\"node soft\" style=\"width:100%; padding:14px 22px; box-shadow:3px 3px 0 var(--line-2);\"><div class=\"node-label\">Офіціант<\u002Fdiv><div class=\"node-sub\">приймає замовлення біля столика<\u002Fdiv><\u002Fdiv>\n        <div class=\"node soft\" style=\"width:100%; padding:14px 22px; box-shadow:3px 3px 0 var(--line-2);\"><div class=\"node-label\">Квиток із замовленням<\u002Fdiv><div class=\"node-sub\">паперовий бланк з позиціями<\u002Fdiv><\u002Fdiv>\n        <div class=\"node soft\" style=\"width:100%; padding:14px 22px; box-shadow:3px 3px 0 var(--line-2);\"><div class=\"node-label\">Шеф-кухар<\u002Fdiv><div class=\"node-sub\">читає квиток, віддає на цех<\u002Fdiv><\u002Fdiv>\n        <div class=\"node soft\" style=\"width:100%; padding:14px 22px; box-shadow:3px 3px 0 var(--line-2);\"><div class=\"node-label\">Спеціалізація цеху<\u002Fdiv><div class=\"node-sub\">гриль · салат · десерт<\u002Fdiv><\u002Fdiv>\n        <div class=\"node soft\" style=\"width:100%; padding:14px 22px; box-shadow:3px 3px 0 var(--line-2);\"><div class=\"node-label\">Кухар<\u002Fdiv><div class=\"node-sub\">готує конкретну страву<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; align-items:center; justify-content:space-around; padding-top:36px;\">\n        <div class=\"quiet mono\" style=\"font-size:28px;\">→<\u002Fdiv>\n        <div class=\"quiet mono\" style=\"font-size:28px;\">→<\u002Fdiv>\n        <div class=\"quiet mono\" style=\"font-size:28px;\">→<\u002Fdiv>\n        <div class=\"quiet mono\" style=\"font-size:28px;\">→<\u002Fdiv>\n        <div class=\"quiet mono\" style=\"font-size:28px;\">→<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <div class=\"eyebrow\" style=\"margin-bottom:2px;\">Telegram-бот · стек<\u002Fdiv>\n        <div class=\"node\" style=\"width:100%; padding:14px 22px; border-color:var(--tg); box-shadow: 4px 4px 0 var(--tg);\">\n          <div class=\"node-label\">Bot API <span class=\"mono\" style=\"color:var(--ink-2); font-weight:400; font-size:24px;\">@ api.telegram.org<\u002Fspan><\u002Fdiv>\n          <div class=\"node-sub\">точка входу · HTTPS · getUpdates<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"node\" style=\"width:100%; padding:14px 22px; border-color:var(--tg); box-shadow: 4px 4px 0 var(--tg);\">\n          <div class=\"node-label\">Update <span class=\"mono\" style=\"color:var(--ink-2); font-weight:400; font-size:24px;\">(Pydantic / JSON)<\u002Fspan><\u002Fdiv>\n          <div class=\"node-sub\">message · callback_query · inline · payment<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"node\" style=\"width:100%; padding:14px 22px; border-color:var(--tg); box-shadow: 4px 4px 0 var(--tg);\">\n          <div class=\"node-label\">Dispatcher <span class=\"mono\" style=\"color:var(--ink-2); font-weight:400; font-size:24px;\">aiogram.Dispatcher()<\u002Fspan><\u002Fdiv>\n          <div class=\"node-sub\">кореневий router · feed_update()<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"node\" style=\"width:100%; padding:14px 22px; border-color:var(--tg); box-shadow: 4px 4px 0 var(--tg);\">\n          <div class=\"node-label\">Router + Filter <span class=\"mono\" style=\"color:var(--ink-2); font-weight:400; font-size:24px;\">@router.message(...)<\u002Fspan><\u002Fdiv>\n          <div class=\"node-sub\">Command · F.text · F.photo · StateFilter<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"node\" style=\"width:100%; padding:14px 22px; border-color:var(--tg); box-shadow: 4px 4px 0 var(--tg);\">\n          <div class=\"node-label\">Handler <span class=\"mono\" style=\"color:var(--ink-2); font-weight:400; font-size:24px;\">async def<\u002Fspan><\u002Fdiv>\n          <div class=\"node-sub\">ваш код · БД · зовнішні API · sendMessage<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 04 — UPDATE OBJECT ============ -->\n  <section data-label=\"04 Update Object\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">04<\u002Fspan>\n      <h2 class=\"h1\">Update — об'єкт події<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"two-col\">\n      <div style=\"display:flex; flex-direction:column; gap:32px;\">\n        <p class=\"body\" style=\"font-size:36px; line-height:1.3;\">\n          Будь-яка дія користувача приходить до бота у вигляді одного JSON-конверта — <span class=\"mono accent\">Update<\u002Fspan>.\n        <\u002Fp>\n        <p class=\"body muted\">\n          Усередині — рівно одне з полів: текстове повідомлення, натискання inline-кнопки, оплата, зміна учасника групи.\n          <span class=\"mono\">aiogram<\u002Fspan> розпаковує JSON у Pydantic-об'єкти, з якими ви працюєте.\n        <\u002Fp>\n\n        <div style=\"display:flex; flex-direction:column; gap:14px; margin-top:8px;\">\n          <div style=\"display:flex; gap:20px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:240px; font-size:26px;\">message<\u002Fspan>\n            <span class=\"small\">текстове / медіа повідомлення<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:20px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:240px; font-size:26px;\">callback_query<\u002Fspan>\n            <span class=\"small\">натискання inline-кнопки<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:20px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:240px; font-size:26px;\">inline_query<\u002Fspan>\n            <span class=\"small\">@botname запит у будь-якому чаті<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:20px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:240px; font-size:26px;\">pre_checkout_query<\u002Fspan>\n            <span class=\"small\">початок оплати — Stars / зовнішня<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:20px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:240px; font-size:26px;\">chat_member<\u002Fspan>\n            <span class=\"small\">зміна статусу учасника<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"code\" style=\"align-self:start;\">\n<span class=\"com\"># Telegram надсилає JSON-конверт<\u002Fspan>\n<span class=\"kw\">Update<\u002Fspan>(\n  update_id=<span class=\"str\">123456<\u002Fspan>,\n  message=<span class=\"kw\">Message<\u002Fspan>(\n    message_id=<span class=\"str\">42<\u002Fspan>,\n    from_user=<span class=\"kw\">User<\u002Fspan>(\n      id=<span class=\"str\">98765<\u002Fspan>,\n      first_name=<span class=\"str\">\"Ivan\"<\u002Fspan>,\n      username=<span class=\"str\">\"ivan_dev\"<\u002Fspan>,\n    ),\n    chat=<span class=\"kw\">Chat<\u002Fspan>(id=<span class=\"str\">98765<\u002Fspan>, type=<span class=\"str\">\"private\"<\u002Fspan>),\n    date=<span class=\"str\">1700000000<\u002Fspan>,\n    text=<span class=\"str\">\"/start\"<\u002Fspan>,\n  ),\n)\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 05 — DELIVERY: TWO PATHS ============ -->\n  <section data-label=\"05 Delivery Paths\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">05<\u002Fspan>\n      <h2 class=\"h1\">Доставка подій — два підходи<\u002Fh2>\n    <\u002Fdiv>\n\n    <p class=\"subtitle\" style=\"margin-bottom:64px; max-width:1300px;\">\n      Як саме Update потрапляє до бота? Telegram пропонує два механізми, і вибір між ними — перше архітектурне рішення.\n    <\u002Fp>\n\n    <div class=\"two-col\" style=\"gap:48px;\">\n      <div style=\"border:2px solid var(--ink); border-radius:16px; padding:48px; display:flex; flex-direction:column; gap:24px;\">\n        <div style=\"display:flex; align-items:center; gap:16px;\">\n          <span class=\"mono\" style=\"font-size:48px; color:var(--tg);\">⟳<\u002Fspan>\n          <h3 class=\"h1\" style=\"font-size:48px;\">Long Polling<\u002Fh3>\n        <\u002Fdiv>\n        <p class=\"body\">\n          Бот <span style=\"font-weight:600;\">сам активно опитує<\u002Fspan> Telegram. Викликає <span class=\"mono\">getUpdates<\u002Fspan> у нескінченному циклі.\n        <\u002Fp>\n        <div style=\"height:1px; background:var(--line); margin:8px 0;\"><\u002Fdiv>\n        <div class=\"small\"><span class=\"mono accent\">Bot →<\u002Fspan> Telegram: «що нового?»<\u002Fdiv>\n        <div class=\"small\"><span class=\"mono accent\">Telegram →<\u002Fspan> Bot: список подій (або порожньо)<\u002Fdiv>\n        <div style=\"margin-top:auto;\">\n          <span class=\"tag ok\">для dev і малих ботів<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border:2px solid var(--ink); border-radius:16px; padding:48px; display:flex; flex-direction:column; gap:24px;\">\n        <div style=\"display:flex; align-items:center; gap:16px;\">\n          <span class=\"mono\" style=\"font-size:48px; color:var(--tg);\">⚡<\u002Fspan>\n          <h3 class=\"h1\" style=\"font-size:48px;\">Webhook<\u002Fh3>\n        <\u002Fdiv>\n        <p class=\"body\">\n          Telegram <span style=\"font-weight:600;\">сам надсилає<\u002Fspan> POST на ваш сервер кожного разу, коли щось трапилось.\n        <\u002Fp>\n        <div style=\"height:1px; background:var(--line); margin:8px 0;\"><\u002Fdiv>\n        <div class=\"small\"><span class=\"mono accent\">Bot →<\u002Fspan> Telegram: «надсилай сюди» <span class=\"quiet\">(одноразово)<\u002Fspan><\u002Fdiv>\n        <div class=\"small\"><span class=\"mono accent\">Telegram →<\u002Fspan> Bot: POST /webhook<\u002Fdiv>\n        <div style=\"margin-top:auto;\">\n          <span class=\"tag tg\">для production і scale<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 06 — POLLING SEQUENCE ============ -->\n  <section data-label=\"06 Polling\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">06<\u002Fspan>\n      <h2 class=\"h1\">Long Polling — як працює<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:64px; flex:1;\">\n      <!-- sequence diagram -->\n      <div style=\"display:flex; flex-direction:column; gap:0;\">\n        <div style=\"display:flex; justify-content:space-between; margin-bottom:24px;\">\n          <div class=\"node\" style=\"min-width:auto; padding:16px 24px;\">\n            <div class=\"node-label\">Ваш бот<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"node tg-fill\" style=\"min-width:auto; padding:16px 24px;\">\n            <div class=\"node-label\">Telegram<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"position:relative; flex:1; display:flex; justify-content:space-between; padding: 0 20px;\">\n          <div style=\"width:3px; background:var(--line-2);\"><\u002Fdiv>\n          <div style=\"width:3px; background:var(--line-2);\"><\u002Fdiv>\n\n          <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; justify-content:space-around; gap:24px;\">\n            <div style=\"display:flex; align-items:center; gap:16px;\">\n              <div style=\"flex:1; height:2px; background:var(--ink); position:relative;\">\n                <div style=\"position:absolute; right:-1px; top:-7px; width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-left:14px solid var(--ink);\"><\u002Fdiv>\n                <div style=\"position:absolute; top:-32px; left:50%; transform:translateX(-50%);\" class=\"mono small\">GET /getUpdates?timeout=30<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"text-align:center; padding:14px 24px; background:var(--bg-soft); border:1px dashed var(--line-2); margin: 0 40px;\">\n              <span class=\"mono small muted\">⏳ Telegram чекає до 30 секунд<\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; align-items:center; gap:16px;\">\n              <div style=\"flex:1; height:2px; background:var(--tg); position:relative;\">\n                <div style=\"position:absolute; left:-1px; top:-7px; width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-right:14px solid var(--tg);\"><\u002Fdiv>\n                <div style=\"position:absolute; top:-32px; left:50%; transform:translateX(-50%);\" class=\"mono small\">200 OK · [нова подія]<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"text-align:center;\">\n              <span class=\"mono small muted\">↻ цикл повторюється нескінченно<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- pros/cons -->\n      <div style=\"display:flex; flex-direction:column; gap:32px; justify-content:center;\">\n        <div>\n          <div class=\"eyebrow\" style=\"color:var(--ok); margin-bottom:16px;\">Переваги<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <div class=\"body\" style=\"font-size:28px;\">Не потрібен публічний IP, домен, SSL<\u002Fdiv>\n            <div class=\"body\" style=\"font-size:28px;\">Працює локально, за NAT, на ноутбуці<\u002Fdiv>\n            <div class=\"body\" style=\"font-size:28px;\">Один рядок коду: <span class=\"mono accent\">dp.start_polling(bot)<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"height:1px; background:var(--line);\"><\u002Fdiv>\n\n        <div>\n          <div class=\"eyebrow\" style=\"color:var(--warn); margin-bottom:16px;\">Обмеження<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <div class=\"body\" style=\"font-size:28px;\">Не можна запустити 2+ інстанси одного бота<\u002Fdiv>\n            <div class=\"body\" style=\"font-size:28px;\">Невелика додаткова затримка<\u002Fdiv>\n            <div class=\"body\" style=\"font-size:28px;\">Витрачає з'єднання на idle-запити<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 07 — WEBHOOK SEQUENCE ============ -->\n  <section data-label=\"07 Webhook\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">07<\u002Fspan>\n      <h2 class=\"h1\">Webhook — як працює<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:64px; flex:1;\">\n      <!-- sequence diagram -->\n      <div style=\"display:flex; flex-direction:column; gap:0;\">\n        <div style=\"display:flex; justify-content:space-between; margin-bottom:24px;\">\n          <div class=\"node tg-fill\" style=\"min-width:auto; padding:16px 24px;\">\n            <div class=\"node-label\">Telegram<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"node\" style=\"min-width:auto; padding:16px 24px;\">\n            <div class=\"node-label\">Ваш бот<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"position:relative; flex:1; display:flex; justify-content:space-between; padding: 0 20px;\">\n          <div style=\"width:3px; background:var(--line-2);\"><\u002Fdiv>\n          <div style=\"width:3px; background:var(--line-2);\"><\u002Fdiv>\n\n          <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; justify-content:space-around; gap:24px;\">\n            <div style=\"display:flex; align-items:center; gap:16px;\">\n              <div style=\"flex:1; height:2px; background:var(--ink-2); position:relative;\">\n                <div style=\"position:absolute; left:-1px; top:-7px; width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-right:14px solid var(--ink-2);\"><\u002Fdiv>\n                <div style=\"position:absolute; top:-32px; left:50%; transform:translateX(-50%);\" class=\"mono small muted\">setWebhook(url) — одноразово<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"text-align:center; padding:14px 24px; background:var(--bg-tint); border:1px dashed var(--tg); margin: 0 40px;\">\n              <span class=\"mono small\" style=\"color:var(--tg);\">⚡ користувач щось пише<\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; align-items:center; gap:16px;\">\n              <div style=\"flex:1; height:2px; background:var(--tg); position:relative;\">\n                <div style=\"position:absolute; right:-1px; top:-7px; width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-left:14px solid var(--tg);\"><\u002Fdiv>\n                <div style=\"position:absolute; top:-32px; left:50%; transform:translateX(-50%);\" class=\"mono small\">POST /webhook · Update JSON<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; align-items:center; gap:16px;\">\n              <div style=\"flex:1; height:2px; background:var(--ink); position:relative;\">\n                <div style=\"position:absolute; left:-1px; top:-7px; width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-right:14px solid var(--ink);\"><\u002Fdiv>\n                <div style=\"position:absolute; top:-32px; left:50%; transform:translateX(-50%);\" class=\"mono small\">200 OK<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- pros/cons -->\n      <div style=\"display:flex; flex-direction:column; gap:32px; justify-content:center;\">\n        <div>\n          <div class=\"eyebrow\" style=\"color:var(--ok); margin-bottom:16px;\">Переваги<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <div class=\"body\" style=\"font-size:28px;\">Миттєва доставка — нульова затримка<\u002Fdiv>\n            <div class=\"body\" style=\"font-size:28px;\">Горизонтальне масштабування за балансером<\u002Fdiv>\n            <div class=\"body\" style=\"font-size:28px;\">Менше idle-з'єднань, ощадніше<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"height:1px; background:var(--line);\"><\u002Fdiv>\n\n        <div>\n          <div class=\"eyebrow\" style=\"color:var(--warn); margin-bottom:16px;\">Вимоги<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <div class=\"body\" style=\"font-size:28px;\">Публічний домен + SSL-сертифікат<\u002Fdiv>\n            <div class=\"body\" style=\"font-size:28px;\">HTTP-сервер (FastAPI, aiohttp.web)<\u002Fdiv>\n            <div class=\"body\" style=\"font-size:28px;\">Локально — потрібен ngrok або VPS<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 08 — POLLING vs WEBHOOK ============ -->\n  <section data-label=\"08 Polling vs Webhook\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">08<\u002Fspan>\n      <h2 class=\"h1\">Polling vs Webhook — коли що<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center;\">\n      <div style=\"display:grid; grid-template-columns: 1.4fr 1fr 1fr; gap:0;\">\n        <div style=\"padding:24px 28px; border-bottom:2px solid var(--ink);\"><\u002Fdiv>\n        <div style=\"padding:24px 28px; border-bottom:2px solid var(--ink); text-align:center;\">\n          <div class=\"eyebrow\">Polling<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:24px 28px; border-bottom:2px solid var(--ink); text-align:center;\">\n          <div class=\"eyebrow accent\">Webhook<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); font-weight:600;\" class=\"body\">Напрямок запиту<\u002Fdiv>\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); text-align:center;\" class=\"body mono\">Bot → Telegram<\u002Fdiv>\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); text-align:center;\" class=\"body mono\">Telegram → Bot<\u002Fdiv>\n\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); font-weight:600;\" class=\"body\">Затримка<\u002Fdiv>\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); text-align:center;\" class=\"body\">мала<\u002Fdiv>\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); text-align:center;\" class=\"body\">мінімальна<\u002Fdiv>\n\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); font-weight:600;\" class=\"body\">Інфраструктура<\u002Fdiv>\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); text-align:center;\" class=\"body\">мінімальна<\u002Fdiv>\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); text-align:center;\" class=\"body\">домен + SSL + сервер<\u002Fdiv>\n\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); font-weight:600;\" class=\"body\">Масштабованість<\u002Fdiv>\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); text-align:center;\" class=\"body\">обмежена<\u002Fdiv>\n        <div style=\"padding:24px 28px; border-bottom:1px solid var(--line); text-align:center;\" class=\"body\">нативна<\u002Fdiv>\n\n        <div style=\"padding:24px 28px; font-weight:600;\" class=\"body\">Де використовувати<\u002Fdiv>\n        <div style=\"padding:24px 28px; text-align:center;\" class=\"body\">dev · малі боти<\u002Fdiv>\n        <div style=\"padding:24px 28px; text-align:center;\" class=\"body\">production · high-traffic<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:56px; padding:28px 36px; background:var(--bg-tint); border-left:4px solid var(--tg);\">\n        <span class=\"body\" style=\"font-style:italic;\">Правило: починайте з polling. Переходьте на webhook коли трафік дійсно цього потребує.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 09 — INTERNAL ARCHITECTURE ============ -->\n  <section data-label=\"09 Internal Architecture\">\n    <style>\n      .pipe-grid {\n        display: grid;\n        grid-template-columns: repeat(4, 1fr);\n        gap: 32px;\n        align-items: stretch;\n      }\n      .pipe-stage {\n        display: flex;\n        flex-direction: column;\n        gap: 14px;\n        position: relative;\n      }\n      .pipe-box {\n        border: 2px solid var(--ink);\n        border-radius: 12px;\n        padding: 26px 22px;\n        background: var(--bg);\n        text-align: center;\n        box-shadow: 6px 6px 0 var(--ink);\n        transition: background 0.3s, color 0.3s, transform 0.3s;\n        min-height: 110px;\n        display: flex;\n        flex-direction: column;\n        justify-content: center;\n        gap: 6px;\n      }\n      .pipe-stage[data-step=\"1\"] .pipe-box { animation: pipe-pulse 8s infinite; animation-delay: 0s; }\n      .pipe-stage[data-step=\"2\"] .pipe-box { animation: pipe-pulse 8s infinite; animation-delay: 1.6s; }\n      .pipe-stage[data-step=\"3\"] .pipe-box { animation: pipe-pulse 8s infinite; animation-delay: 3.2s; }\n      .pipe-stage[data-step=\"4\"] .pipe-box { animation: pipe-pulse 8s infinite; animation-delay: 4.8s; }\n      @keyframes pipe-pulse {\n        0%, 4% {\n          background: var(--tg);\n          color: white;\n          transform: translateY(-6px);\n          box-shadow: 6px 12px 0 var(--tg-dark);\n          border-color: var(--tg-dark);\n        }\n        14%, 100% { /* return to base */ }\n      }\n\n      .pipe-num {\n        font-family: var(--mono);\n        font-size: 26px;\n        color: var(--tg);\n        font-weight: 600;\n      }\n      .pipe-title {\n        font-size: 30px;\n        font-weight: 700;\n        line-height: 1.1;\n      }\n      .pipe-sub {\n        font-size: 24px;\n        color: var(--ink-2);\n        line-height: 1.25;\n      }\n\n      .flow-track {\n        position: relative;\n        height: 28px;\n        margin: 12px 0 0;\n      }\n      .flow-line {\n        position: absolute;\n        top: 50%;\n        left: 0;\n        right: 0;\n        height: 3px;\n        background: var(--line-2);\n        transform: translateY(-50%);\n        border-radius: 2px;\n      }\n      .flow-dot {\n        position: absolute;\n        top: 50%;\n        width: 24px;\n        height: 24px;\n        border-radius: 50%;\n        background: var(--tg);\n        box-shadow: 0 0 0 6px rgba(0, 136, 204, 0.18), 0 0 24px var(--tg);\n        transform: translate(-50%, -50%);\n        animation: flow-travel 8s infinite linear;\n      }\n      @keyframes flow-travel {\n        0%   { left: 0%;   opacity: 0; }\n        4%   { opacity: 1; }\n        96%  { opacity: 1; }\n        100% { left: 100%; opacity: 0; }\n      }\n      .flow-label {\n        position: absolute;\n        top: -34px;\n        font-family: var(--mono);\n        font-size: 24px;\n        color: var(--tg);\n        font-weight: 600;\n        transform: translateX(-50%);\n        animation: flow-travel 8s infinite linear;\n        white-space: nowrap;\n      }\n    <\u002Fstyle>\n\n    <div class=\"slide-title-row\">\n      <span class=\"num\">09<\u002Fspan>\n      <h2 class=\"h1\">Шлях Update всередині бота<\u002Fh2>\n    <\u002Fdiv>\n\n    <p class=\"subtitle\" style=\"margin-bottom:40px;\">\n      Чотири прості кроки — від отриманого повідомлення до вашої функції-відповіді.\n    <\u002Fp>\n\n    <div class=\"pipe-grid\">\n      <div class=\"pipe-stage\" data-step=\"1\">\n        <div class=\"pipe-num\">01<\u002Fdiv>\n        <div class=\"pipe-box\">\n          <div class=\"pipe-title\">Update<\u002Fdiv>\n          <div class=\"pipe-sub\">приходить нова подія<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pipe-stage\" data-step=\"2\">\n        <div class=\"pipe-num\">02<\u002Fdiv>\n        <div class=\"pipe-box\">\n          <div class=\"pipe-title\">Dispatcher<\u002Fdiv>\n          <div class=\"pipe-sub\">приймає й передає далі<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pipe-stage\" data-step=\"3\">\n        <div class=\"pipe-num\">03<\u002Fdiv>\n        <div class=\"pipe-box\">\n          <div class=\"pipe-title\">Router + Filter<\u002Fdiv>\n          <div class=\"pipe-sub\">«а що це таке?»<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pipe-stage\" data-step=\"4\">\n        <div class=\"pipe-num\">04<\u002Fdiv>\n        <div class=\"pipe-box\">\n          <div class=\"pipe-title\">Handler<\u002Fdiv>\n          <div class=\"pipe-sub\">ваша функція відповідає<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"flow-track\">\n      <div class=\"flow-line\"><\u002Fdiv>\n      <div class=\"flow-dot\"><\u002Fdiv>\n      <div class=\"flow-label\">Update<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap:18px; margin-top:48px; flex:1;\">\n      <div style=\"display:flex; gap:18px; align-items:baseline;\">\n        <span class=\"mono accent\" style=\"min-width:180px; font-size:26px; font-weight:600;\">Update<\u002Fspan>\n        <span class=\"body\" style=\"font-size:28px;\">Користувач щось зробив у Telegram — Telegram надіслав JSON боту.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:18px; align-items:baseline;\">\n        <span class=\"mono accent\" style=\"min-width:180px; font-size:26px; font-weight:600;\">Dispatcher<\u002Fspan>\n        <span class=\"body\" style=\"font-size:28px;\">Центральна точка. Як секретарка в офісі — приймає все й вирішує, кому передати.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:18px; align-items:baseline;\">\n        <span class=\"mono accent\" style=\"min-width:180px; font-size:26px; font-weight:600;\">Router + Filter<\u002Fspan>\n        <span class=\"body\" style=\"font-size:28px;\">Серія перевірок: «це <span class=\"mono\">/start<\u002Fspan>? це фото? це текст?» Перша «так» — обирає handler.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:18px; align-items:baseline;\">\n        <span class=\"mono accent\" style=\"min-width:180px; font-size:26px; font-weight:600;\">Handler<\u002Fspan>\n        <span class=\"body\" style=\"font-size:28px;\">Ваш <span class=\"mono\">async def<\u002Fspan>. Тут — реальна робота: відповісти, зберегти в БД, викликати API.<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:14px; padding:18px 28px; background:var(--bg-soft); border:1px dashed var(--line-2); border-radius:10px;\">\n        <span class=\"small\">\n          <span style=\"font-weight:600; color:var(--ink);\">Опціонально:<\u002Fspan>\n          між цими кроками можна вставити <span class=\"mono\">Middleware<\u002Fspan> — наприклад, перевірити бан або відкрити з'єднання з БД. Це для пізніше.\n        <\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 10 — ROUTER ============ -->\n  <section data-label=\"10 Router\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">10<\u002Fspan>\n      <h2 class=\"h1\">Router — каскад фільтрів<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"two-col\">\n      <div style=\"display:flex; flex-direction:column; gap:32px;\">\n        <p class=\"body\" style=\"font-size:36px; line-height:1.3;\">\n          Роутер ставить кожному Update <span class=\"accent\" style=\"font-weight:600;\">серію питань<\u002Fspan> — фільтрів.\n          Перший <span class=\"mono\">True<\u002Fspan> споживає подію.\n        <\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:18px;\">\n          <div style=\"display:flex; gap:20px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:280px; font-size:26px;\">Command(\"start\")<\u002Fspan>\n            <span class=\"small\">це команда /start?<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:20px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:280px; font-size:26px;\">F.text<\u002Fspan>\n            <span class=\"small\">це текстове повідомлення?<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:20px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:280px; font-size:26px;\">F.photo<\u002Fspan>\n            <span class=\"small\">це фото?<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:20px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:280px; font-size:26px;\">F.text == \"Меню\"<\u002Fspan>\n            <span class=\"small\">текст дорівнює рядку?<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:20px; align-items:baseline;\">\n            <span class=\"mono accent\" style=\"min-width:280px; font-size:26px;\">StateFilter(MyFSM)<\u002Fspan>\n            <span class=\"small\">користувач у певному стані?<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"small\" style=\"margin-top:8px;\">\n          Роутери реєструються у Dispatcher у порядку важливості. Один файл — один роутер за доменом.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"code\" style=\"align-self:start;\">\n<span class=\"com\"># handlers/start.py<\u002Fspan>\n<span class=\"kw\">from<\u002Fspan> aiogram <span class=\"kw\">import<\u002Fspan> Router\n<span class=\"kw\">from<\u002Fspan> aiogram.filters <span class=\"kw\">import<\u002Fspan> Command\n\nrouter = <span class=\"fn\">Router<\u002Fspan>()\n\n<span class=\"dec\">@router.message(Command(<span class=\"str\">\"start\"<\u002Fspan>))<\u002Fspan>\n<span class=\"kw\">async def<\u002Fspan> <span class=\"fn\">start<\u002Fspan>(message):\n    <span class=\"kw\">await<\u002Fspan> message.<span class=\"fn\">answer<\u002Fspan>(<span class=\"str\">\"Привіт!\"<\u002Fspan>)\n\n<span class=\"dec\">@router.message(F.text)<\u002Fspan>\n<span class=\"kw\">async def<\u002Fspan> <span class=\"fn\">echo<\u002Fspan>(message):\n    <span class=\"kw\">await<\u002Fspan> message.<span class=\"fn\">answer<\u002Fspan>(message.text)\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 11 — FILTER ORDER ANTIPATTERN ============ -->\n  <section data-label=\"11 Filter Order\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">11<\u002Fspan>\n      <h2 class=\"h1\">Порядок фільтрів — критичний момент<\u002Fh2>\n    <\u002Fdiv>\n\n    <p class=\"subtitle\" style=\"margin-bottom:48px; max-width:1500px;\">\n      Перший збіг виграє. Якщо широкий фільтр стоїть вище специфічного — специфічний ніколи не виконається.\n    <\u002Fp>\n\n    <div class=\"two-col\">\n      <div style=\"border:2px solid var(--warn); border-radius:14px; padding:36px; background:#fff7ed;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:24px;\">\n          <span class=\"tag warn\">антипатерн<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"code\" style=\"background:#1a1411; font-size:24px;\">\n<span class=\"dec\">@router.message(F.text)<\u002Fspan>\n<span class=\"kw\">async def<\u002Fspan> <span class=\"fn\">catch_all<\u002Fspan>(message):\n    <span class=\"kw\">await<\u002Fspan> message.<span class=\"fn\">answer<\u002Fspan>(message.text)\n\n<span class=\"com\"># ⛔ ніколи не спрацює — F.text перехопить /help<\u002Fspan>\n<span class=\"dec\">@router.message(Command(<span class=\"str\">\"help\"<\u002Fspan>))<\u002Fspan>\n<span class=\"kw\">async def<\u002Fspan> <span class=\"fn\">help_cmd<\u002Fspan>(message):\n    <span class=\"kw\">await<\u002Fspan> message.<span class=\"fn\">answer<\u002Fspan>(<span class=\"str\">\"Довідка\"<\u002Fspan>)\n        <\u002Fdiv>\n        <p class=\"body\" style=\"margin-top:20px; font-size:26px; color:var(--warn);\">\n          /help — це теж текст. F.text спіймає першим, і команда стане мертвим кодом.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"border:2px solid var(--ok); border-radius:14px; padding:36px; background:#f0fdf4;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:24px;\">\n          <span class=\"tag ok\">правильно<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"code\" style=\"background:#0c1a13; font-size:24px;\">\n<span class=\"com\"># специфічні фільтри — вище<\u002Fspan>\n<span class=\"dec\">@router.message(Command(<span class=\"str\">\"help\"<\u002Fspan>))<\u002Fspan>\n<span class=\"kw\">async def<\u002Fspan> <span class=\"fn\">help_cmd<\u002Fspan>(message):\n    <span class=\"kw\">await<\u002Fspan> message.<span class=\"fn\">answer<\u002Fspan>(<span class=\"str\">\"Довідка\"<\u002Fspan>)\n\n<span class=\"com\"># catch-all — в самому кінці<\u002Fspan>\n<span class=\"dec\">@router.message(F.text)<\u002Fspan>\n<span class=\"kw\">async def<\u002Fspan> <span class=\"fn\">catch_all<\u002Fspan>(message):\n    <span class=\"kw\">await<\u002Fspan> message.<span class=\"fn\">answer<\u002Fspan>(message.text)\n        <\u002Fdiv>\n        <p class=\"body\" style=\"margin-top:20px; font-size:26px; color:var(--ok);\">\n          Команди — спочатку, типи контенту — далі, catch-all — останнім. Завжди.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 12 — WHY ASYNCIO ============ -->\n  <section data-label=\"12 Why Asyncio\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">12<\u002Fspan>\n      <h2 class=\"h1\">Чому asyncio — обов'язково<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"two-col wide-left\">\n      <div style=\"display:flex; flex-direction:column; gap:36px;\">\n        <p class=\"body\" style=\"font-size:38px; line-height:1.3;\">\n          Уявіть 1000 користувачів одночасно. Кожен handler може чекати DB, зовнішній API, файл.\n        <\u002Fp>\n        <p class=\"body muted\">\n          У синхронному коді десятий у черзі чекає, поки бот закінчить обробку перших дев'яти. Асинхронний код вирішує це <span style=\"font-weight:600;\">без потоків<\u002Fspan> — один процес, cooperative multitasking.\n        <\u002Fp>\n\n        <div style=\"background:var(--bg-soft); border-left:4px solid var(--tg); padding:24px 32px; margin-top:12px;\">\n          <div class=\"eyebrow\" style=\"margin-bottom:12px;\">Правило<\u002Fdiv>\n          <p class=\"body\" style=\"font-size:28px;\">\n            Усе, що робить I/O — має бути <span class=\"mono accent\">async<\u002Fspan>.\n            <span class=\"mono\">requests<\u002Fspan> → <span class=\"mono\">aiohttp<\u002Fspan>,\n            <span class=\"mono\">psycopg2<\u002Fspan> → <span class=\"mono\">asyncpg<\u002Fspan>,\n            <span class=\"mono\">time.sleep<\u002Fspan> → <span class=\"mono\">asyncio.sleep<\u002Fspan>.\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:32px; justify-content:center;\">\n        <div>\n          <div class=\"eyebrow\" style=\"color:var(--warn); margin-bottom:16px;\">Sync — блокуюча обробка<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:8px; font-family:var(--mono); font-size:24px;\">\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:80px;\">User A<\u002Fspan><div style=\"height:18px; background:var(--warn); width:140px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:80px;\">User B<\u002Fspan><div style=\"height:18px; background:var(--warn); width:140px; margin-left:140px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:80px;\">User C<\u002Fspan><div style=\"height:18px; background:var(--warn); width:140px; margin-left:280px;\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"small\" style=\"margin-top:8px; color:var(--warn);\">⏱ загалом 9 секунд<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <div class=\"eyebrow\" style=\"color:var(--ok); margin-bottom:16px;\">Async — паралельно<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:8px; font-family:var(--mono); font-size:24px;\">\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:80px;\">User A<\u002Fspan><div style=\"height:18px; background:var(--ok); width:140px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:80px;\">User B<\u002Fspan><div style=\"height:18px; background:var(--ok); width:140px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:80px;\">User C<\u002Fspan><div style=\"height:18px; background:var(--ok); width:140px;\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"small\" style=\"margin-top:8px; color:var(--ok);\">⏱ загалом ~3 секунди<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 13 — EVENT LOOP TIMELINE ============ -->\n  <section data-label=\"13 Event Loop Timeline\">\n    <style>\n      .eltl-grid {\n        display: grid;\n        grid-template-columns: 110px 1fr;\n        gap: 0;\n        flex: 1;\n        position: relative;\n      }\n      .eltl-tcol {\n        display: flex;\n        flex-direction: column;\n        justify-content: space-around;\n        padding-right: 20px;\n      }\n      .eltl-tlabel {\n        font-family: var(--mono);\n        font-size: 26px;\n        color: var(--ink-3);\n        transition: color 0.2s;\n      }\n      .eltl-tlabel.active {\n        color: var(--tg);\n        font-weight: 700;\n      }\n      .eltl-rows {\n        display: flex;\n        flex-direction: column;\n        justify-content: space-around;\n        gap: 0;\n        position: relative;\n      }\n      .eltl-spine {\n        position: absolute;\n        left: 200px;\n        top: 0;\n        bottom: 0;\n        width: 2px;\n        background: var(--line);\n      }\n      .eltl-row {\n        display: flex;\n        align-items: center;\n        gap: 32px;\n        padding: 14px 20px;\n        border-radius: 12px;\n        position: relative;\n        z-index: 1;\n        transition: background 0.25s, transform 0.25s, box-shadow 0.25s;\n        animation: eltl-pulse 12s infinite ease-out;\n      }\n      .eltl-row[data-t=\"1\"] { animation-delay: 0s; }\n      .eltl-row[data-t=\"2\"] { animation-delay: 1.4s; }\n      .eltl-row[data-t=\"3\"] { animation-delay: 2.4s; }\n      .eltl-row[data-t=\"4\"] { animation-delay: 3.4s; }\n      .eltl-row[data-t=\"5\"] { animation-delay: 6s; }\n      @keyframes eltl-pulse {\n        0%, 1% { background: transparent; box-shadow: none; transform: translateX(0); }\n        2%, 6% {\n          background: var(--bg-tint);\n          box-shadow: -6px 0 0 var(--tg);\n          transform: translateX(6px);\n        }\n        14%, 100% { background: transparent; box-shadow: none; transform: translateX(0); }\n      }\n      .eltl-dot {\n        width: 14px; height: 14px;\n        border-radius: 50%;\n        background: var(--ink-3);\n        position: absolute;\n        left: 192px;\n        top: 50%;\n        transform: translate(0, -50%);\n        transition: background 0.2s, box-shadow 0.2s, transform 0.2s;\n        animation: eltl-dotpulse 12s infinite ease-out;\n      }\n      .eltl-row[data-t=\"1\"] .eltl-dot { animation-delay: 0s; }\n      .eltl-row[data-t=\"2\"] .eltl-dot { animation-delay: 1.4s; }\n      .eltl-row[data-t=\"3\"] .eltl-dot { animation-delay: 2.4s; }\n      .eltl-row[data-t=\"4\"] .eltl-dot { animation-delay: 3.4s; }\n      .eltl-row[data-t=\"5\"] .eltl-dot { animation-delay: 6s; }\n      @keyframes eltl-dotpulse {\n        0%, 1% { background: var(--ink-3); box-shadow: none; transform: translate(0, -50%) scale(1); }\n        2%, 8% {\n          background: var(--tg);\n          box-shadow: 0 0 0 6px rgba(0,136,204,0.18), 0 0 18px var(--tg);\n          transform: translate(0, -50%) scale(1.4);\n        }\n        18%, 100% { background: var(--ink-3); box-shadow: none; transform: translate(0, -50%) scale(1); }\n      }\n    <\u002Fstyle>\n\n    <div class=\"slide-title-row\">\n      <span class=\"num\">13<\u002Fspan>\n      <h2 class=\"h1\">Event Loop — timeline чотирьох користувачів<\u002Fh2>\n    <\u002Fdiv>\n\n    <p class=\"subtitle\" style=\"margin-bottom: 48px; max-width: 1500px; width: 100px; font-family: &quot;JetBrains Mono&quot;\"><\u002Fp>\n\n    <div class=\"eltl-grid\">\n      <div class=\"eltl-tcol\">\n        <div class=\"eltl-tlabel\">T = 0.0s<\u002Fdiv>\n        <div class=\"eltl-tlabel\">T = 0.1s<\u002Fdiv>\n        <div class=\"eltl-tlabel\">T = 0.2s<\u002Fdiv>\n        <div class=\"eltl-tlabel\">T = 0.3s<\u002Fdiv>\n        <div class=\"eltl-tlabel\">T = 10s<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eltl-rows\">\n        <div class=\"eltl-spine\"><\u002Fdiv>\n\n        <div class=\"eltl-row\" data-t=\"1\">\n          <span class=\"eltl-dot\"><\u002Fspan>\n          <span class=\"mono\" style=\"min-width:200px; font-size:26px; color:var(--tg);\">User A · /slow<\u002Fspan>\n          <span class=\"body\" style=\"font-size:28px;\">→ <span class=\"mono\">await asyncio.sleep(10)<\u002Fspan> <span class=\"quiet\">— SUSPENDED, Event Loop вільний<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"eltl-row\" data-t=\"2\">\n          <span class=\"eltl-dot\"><\u002Fspan>\n          <span class=\"mono\" style=\"min-width:200px; font-size:26px; color:var(--tg);\">User B · /fast<\u002Fspan>\n          <span class=\"body\" style=\"font-size:28px;\">→ <span class=\"mono\">message.answer()<\u002Fspan> <span style=\"color:var(--ok);\">— ✓ відповідь миттєво<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"eltl-row\" data-t=\"3\">\n          <span class=\"eltl-dot\"><\u002Fspan>\n          <span class=\"mono\" style=\"min-width:200px; font-size:26px; color:var(--tg);\">User C · /fast<\u002Fspan>\n          <span class=\"body\" style=\"font-size:28px;\">→ <span class=\"mono\">message.answer()<\u002Fspan> <span style=\"color:var(--ok);\">— ✓ відповідь миттєво<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"eltl-row\" data-t=\"4\">\n          <span class=\"eltl-dot\"><\u002Fspan>\n          <span class=\"mono\" style=\"min-width:200px; font-size:26px; color:var(--tg);\">User D · /fast<\u002Fspan>\n          <span class=\"body\" style=\"font-size:28px;\">→ <span class=\"mono\">message.answer()<\u002Fspan> <span style=\"color:var(--ok);\">— ✓ відповідь миттєво<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"eltl-row\" data-t=\"5\">\n          <span class=\"eltl-dot\"><\u002Fspan>\n          <span class=\"mono\" style=\"min-width:200px; font-size:26px; color:var(--tg);\">User A · resume<\u002Fspan>\n          <span class=\"body\" style=\"font-size:28px;\">→ <span class=\"mono\">message.answer(\"Готово\")<\u002Fspan> <span style=\"color:var(--ok);\">— ✓ виконано<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:48px; padding:24px 32px; background:var(--bg-tint); border-left:4px solid var(--tg);\">\n      <span class=\"body\">Один процес. Нуль потоків. Усі четверо отримали відповідь — троє миттєво, A через 10 секунд.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 14 — BLOCKING ============ -->\n  <section data-label=\"14 Blocking\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">14<\u002Fspan>\n      <h2 class=\"h1\">Як зламати Event Loop<\u002Fh2>\n    <\u002Fdiv>\n\n    <p class=\"subtitle\" style=\"margin-bottom:40px; max-width:1500px;\">\n      Один синхронний виклик у handler — і вся ваша тисяча користувачів стоїть.\n    <\u002Fp>\n\n    <div class=\"two-col\">\n      <div>\n        <div class=\"tag warn\" style=\"margin-bottom:20px;\">⛔ блокує Event Loop<\u002Fdiv>\n        <div class=\"code\" style=\"background:#1a1411; font-size:24px;\">\n<span class=\"dec\">@router.message(Command(<span class=\"str\">\"slow\"<\u002Fspan>))<\u002Fspan>\n<span class=\"kw\">async def<\u002Fspan> <span class=\"fn\">bad<\u002Fspan>(message):\n    <span class=\"com\"># синхронний sleep — стоп для всіх<\u002Fspan>\n    time.<span class=\"fn\">sleep<\u002Fspan>(<span class=\"str\">10<\u002Fspan>)\n\n    <span class=\"com\"># синхронний HTTP — стоп для всіх<\u002Fspan>\n    data = requests.<span class=\"fn\">get<\u002Fspan>(url).<span class=\"fn\">json<\u002Fspan>()\n\n    <span class=\"com\"># важкі CPU-обчислення — стоп для всіх<\u002Fspan>\n    result = <span class=\"fn\">heavy_math<\u002Fspan>()\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"tag ok\" style=\"margin-bottom:20px;\">✓ не блокує Event Loop<\u002Fdiv>\n        <div class=\"code\" style=\"background:#0c1a13; font-size:24px;\">\n<span class=\"dec\">@router.message(Command(<span class=\"str\">\"slow\"<\u002Fspan>))<\u002Fspan>\n<span class=\"kw\">async def<\u002Fspan> <span class=\"fn\">good<\u002Fspan>(message):\n    <span class=\"com\"># асинхронна пауза<\u002Fspan>\n    <span class=\"kw\">await<\u002Fspan> asyncio.<span class=\"fn\">sleep<\u002Fspan>(<span class=\"str\">10<\u002Fspan>)\n\n    <span class=\"com\"># асинхронний HTTP<\u002Fspan>\n    <span class=\"kw\">async with<\u002Fspan> aiohttp.<span class=\"fn\">ClientSession<\u002Fspan>() <span class=\"kw\">as<\u002Fspan> s:\n        data = <span class=\"kw\">await<\u002Fspan> (<span class=\"kw\">await<\u002Fspan> s.<span class=\"fn\">get<\u002Fspan>(url)).<span class=\"fn\">json<\u002Fspan>()\n\n    <span class=\"com\"># CPU — у виконавця<\u002Fspan>\n    result = <span class=\"kw\">await<\u002Fspan> loop.<span class=\"fn\">run_in_executor<\u002Fspan>(\n        <span class=\"kw\">None<\u002Fspan>, heavy_math)\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 15 — FSM ============ -->\n  <section data-label=\"15 FSM\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">15<\u002Fspan>\n      <h2 class=\"h1\">Кінцевий автомат (FSM) — пам'ять діалогу<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"two-col\">\n      <div style=\"display:flex; flex-direction:column; gap:28px;\">\n        <p class=\"body\" style=\"font-size:36px; line-height:1.3;\">\n          Без FSM бот не пам'ятає, чому раптом ви пишете <span class=\"mono accent\">«Іван»<\u002Fspan>. З FSM — пам'ятає.\n        <\u002Fp>\n        <p class=\"body muted\">\n          <span class=\"mono\">FSMContext<\u002Fspan> зберігає стан кожного користувача окремо. Так будуються багатокрокові форми: реєстрація, оформлення замовлення, опитування.\n        <\u002Fp>\n        <div style=\"background:var(--bg-soft); border:1px solid var(--line); border-radius:12px; padding:24px 32px;\">\n          <div class=\"eyebrow\" style=\"margin-bottom:12px;\">Сховище стану<\u002Fdiv>\n          <div class=\"small\" style=\"margin-bottom:6px;\"><span class=\"mono\">MemoryStorage<\u002Fspan> — RAM, для dev. Перезапуск = втрата.<\u002Fdiv>\n          <div class=\"small\"><span class=\"mono\">RedisStorage<\u002Fspan> — персистентне, для production.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;\">\n        <div class=\"node soft\" style=\"min-width:380px; text-align:center; padding:14px 24px;\">\n          <div class=\"node-label\">IDLE<\u002Fdiv>\n          <div class=\"node-sub\">очікування /register<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:2px;\">\n          <span class=\"mono\" style=\"font-size:24px; color:var(--ink-2); background:var(--bg); padding:0 6px;\">/register<\u002Fspan>\n          <div style=\"width:3px; height:24px; background:var(--ink); border-radius:2px;\"><\u002Fdiv>\n          <div style=\"width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-top:11px solid var(--ink);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"node\" style=\"min-width:380px; text-align:center; padding:14px 24px; border-color:var(--tg); box-shadow:6px 6px 0 var(--tg);\">\n          <div class=\"node-label\">WAITING_NAME<\u002Fdiv>\n          <div class=\"node-sub\">«Як вас звати?»<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:2px;\">\n          <span class=\"mono\" style=\"font-size:24px; color:var(--ink-2); background:var(--bg); padding:0 6px;\">update_data(name)<\u002Fspan>\n          <div style=\"width:3px; height:24px; background:var(--ink); border-radius:2px;\"><\u002Fdiv>\n          <div style=\"width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-top:11px solid var(--ink);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"node\" style=\"min-width:380px; text-align:center; padding:14px 24px; border-color:var(--tg); box-shadow:6px 6px 0 var(--tg);\">\n          <div class=\"node-label\">WAITING_AGE<\u002Fdiv>\n          <div class=\"node-sub\">«Скільки вам років?»<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:2px;\">\n          <span class=\"mono\" style=\"font-size:24px; color:var(--ink-2); background:var(--bg); padding:0 6px;\">state.clear()<\u002Fspan>\n          <div style=\"width:3px; height:24px; background:var(--ink); border-radius:2px;\"><\u002Fdiv>\n          <div style=\"width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-top:11px solid var(--ink);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"node tg-fill\" style=\"min-width:380px; text-align:center; padding:14px 24px;\">\n          <div class=\"node-label\">DONE ✓<\u002Fdiv>\n          <div class=\"node-sub\">користувача зареєстровано<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 16 — FIRST BOT 4 STEPS ============ -->\n  <section data-label=\"16 First Bot\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">16<\u002Fspan>\n      <h2 class=\"h1\">Перший бот — чотири кроки<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns: repeat(4, 1fr); gap:32px; flex:1;\">\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n        <div class=\"mono\" style=\"font-size:96px; color:var(--tg); line-height:1; font-weight:600;\">01<\u002Fdiv>\n        <h3 class=\"body\" style=\"font-size:32px; font-weight:600;\">@BotFather<\u002Fh3>\n        <p class=\"small\">У Telegram надсилаєте <span class=\"mono\">/newbot<\u002Fspan>, отримуєте токен.<\u002Fp>\n        <div class=\"mono\" style=\"font-size:24px; color:var(--ink-3); background:var(--bg-soft); padding:12px 16px; border-radius:8px; word-break:break-all;\">\n          1234567890:AAHd...\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n        <div class=\"mono\" style=\"font-size:96px; color:var(--tg); line-height:1; font-weight:600;\">02<\u002Fdiv>\n        <h3 class=\"body\" style=\"font-size:32px; font-weight:600;\">Встановити aiogram<\u002Fh3>\n        <p class=\"small\">Одна команда в терміналі.<\u002Fp>\n        <div class=\"mono\" style=\"font-size:24px; color:var(--ink); background:var(--bg-soft); padding:12px 16px; border-radius:8px;\">\n          pip install aiogram\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n        <div class=\"mono\" style=\"font-size:96px; color:var(--tg); line-height:1; font-weight:600;\">03<\u002Fdiv>\n        <h3 class=\"body\" style=\"font-size:32px; font-weight:600;\">Написати handler<\u002Fh3>\n        <p class=\"small\">5 рядків — і у вас echo-бот.<\u002Fp>\n        <div class=\"code\" style=\"background:#0f172a; font-size:24px; padding:14px 16px;\">\n<span class=\"dec\">@dp.message()<\u002Fspan>\n<span class=\"kw\">async def<\u002Fspan> <span class=\"fn\">echo<\u002Fspan>(m):\n  <span class=\"kw\">await<\u002Fspan> m.<span class=\"fn\">answer<\u002Fspan>(m.text)\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n        <div class=\"mono\" style=\"font-size:96px; color:var(--tg); line-height:1; font-weight:600;\">04<\u002Fdiv>\n        <h3 class=\"body\" style=\"font-size:32px; font-weight:600;\">Запустити<\u002Fh3>\n        <p class=\"small\">Polling — і бот живий.<\u002Fp>\n        <div class=\"mono\" style=\"font-size:24px; color:var(--ink); background:var(--bg-soft); padding:12px 16px; border-radius:8px;\">\n          python main.py\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:48px; padding:24px 32px; background:var(--bg-tint); border-left:4px solid var(--tg);\">\n      <span class=\"body\">Від нуля до живого бота — приблизно 30 хвилин. Все інше — питання глибини.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 17 — WHAT TO BUILD ============ -->\n  <section data-label=\"17 What to Build\" style=\"\">\n    <style>\n      .lm {\n        width: 96px;\n        height: 96px;\n        border-radius: 22px;\n        background: var(--tg);\n        color: white;\n        display: flex;\n        align-ite or: var(--tg);\n        border: 3px solid var(--tg);\n      }\n      .lm.lm-inline .lm-glyph { font-size: 62px; line-height: 0.9; }\n      /* Moderation — green with check */\n      .lm.lm-mod { background: var(--ok); }\n      .lm.lm-mod .lm-glyph { font-size: 56px; line-height: 0.9; }\n    <\u002Fstyle>\n\n    <div class=\"slide-title-row\">\n      <span class=\"num\">17<\u002Fspan>\n      <h2 class=\"h1\" style=\"\">Що можна побудувати<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns: repeat(3, 1fr); gap:32px; flex:1;\">\n\n      <div style=\"border: 2px solid var(--ink); border-radius: 14px; padding: 32px 30px 32px 32px; display: flex; flex-direction: column; gap: 14px; height: 345.325px;\">\n        <div class=\"lm lm-shop\"><span class=\"lm-glyph\">₴<\u002Fspan><\u002Fdiv>\n        <div class=\"eyebrow accent\">e-commerce<\u002Fdiv>\n        <h3 class=\"body\" style=\"font-size:32px; font-weight:600;\">Магазини<\u002Fh3>\n        <p class=\"small\" style=\"\">Каталог · кошик · оплата через Telegram Stars або Stripe<\u002Fp>\n        <div style=\"margin-top:auto; display:flex; gap:8px; flex-wrap:wrap;\">\n          <span class=\"tag\">⭐⭐⭐<\u002Fspan>\n          <span class=\"tag tg\">direct sales<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border: 2px solid var(--ink); border-radius: 14px; padding: 30px; display: flex; flex-direction: column; gap: 14px; height: 345.325px;\">\n        <div class=\"lm lm-ai\"><span class=\"lm-glyph\">Ai<\u002Fspan><\u002Fdiv>\n        <div class=\"eyebrow accent\" style=\"\">AI<\u002Fdiv>\n        <h3 class=\"body\" style=\"font-size:32px; font-weight:600;\">AI-асистенти<\u002Fh3>\n        <p class=\"small\" style=\"\">OpenAI · аналіз фото · транскрипція · переклад документів<\u002Fp>\n        <div style=\"margin-top:auto; display:flex; gap:8px; flex-wrap:wrap;\">\n          <span class=\"tag\">⭐⭐<\u002Fspan>\n          <span class=\"tag tg\">підписки · Stars<\u002Fsp
