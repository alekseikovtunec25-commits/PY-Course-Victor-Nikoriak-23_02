p:8px; flex-wrap:wrap;\">\n          <span class=\"tag\">⭐⭐<\u002Fspan>\n          <span class=\"tag tg\">реклама · affiliate<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border: 2px solid var(--ink); border-radius: 14px; padding: 30px; display: flex; flex-direction: column; gap: 14px; height: 345px;\">\n        <div class=\"lm lm-mod\"><span class=\"lm-glyph\">✓<\u002Fspan><\u002Fdiv>\n        <div class=\"eyebrow accent\">community<\u002Fdiv>\n        <h3 class=\"body\" style=\"font-size:32px; font-weight:600;\">Модерація<\u002Fh3>\n        <p class=\"small\">Капча · антиспам · стоп-слова · обмеження частоти<\u002Fp>\n        <div style=\"margin-top:auto; display:flex; gap:8px; flex-wrap:wrap;\">\n          <span class=\"tag\">⭐⭐⭐<\u002Fspan>\n          <span class=\"tag tg\">підписка адмінам<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 18 — SCALING PATH ============ -->\n  <section data-label=\"18 Scaling Path\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">18<\u002Fspan>\n      <h2 class=\"h1\">Шлях до production<\u002Fh2>\n    <\u002Fdiv>\n\n    <p class=\"subtitle\" style=\"margin-bottom:64px;\">\n      Архітектура зростає разом з трафіком. Не оптимізуйте передчасно.\n    <\u002Fp>\n\n    <div style=\"display:grid; grid-template-columns: repeat(4, 1fr); gap:24px; flex:1; align-items:stretch;\">\n      <div style=\"display:flex; flex-direction:column;\">\n        <div style=\"background:var(--bg-soft); border:2px solid var(--line-2); border-radius:12px; padding:32px; flex:1; display:flex; flex-direction:column; gap:16px;\">\n          <div class=\"mono accent\" style=\"font-size:24px;\">stage 1<\u002Fdiv>\n          <h3 class=\"body\" style=\"font-size:28px; font-weight:600;\">Development<\u002Fh3>\n          <div class=\"small\">Polling · MemoryStorage · ноутбук<\u002Fdiv>\n          <div class=\"mono\" style=\"margin-top:auto; font-size:24px; color:var(--ink-2);\">1–10 users<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column;\">\n        <div style=\"background:var(--bg-tint); border:2px solid var(--tg-light); border-radius:12px; padding:32px; flex:1; display:flex; flex-direction:column; gap:16px;\">\n          <div class=\"mono accent\" style=\"font-size:24px;\">stage 2<\u002Fdiv>\n          <h3 class=\"body\" style=\"font-size:28px; font-weight:600;\">Small prod<\u002Fh3>\n          <div class=\"small\">Polling · RedisStorage · 1 VPS<\u002Fdiv>\n          <div class=\"mono\" style=\"margin-top:auto; font-size:24px; color:var(--ink-2);\">до 1k users/day<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column;\">\n        <div style=\"background:var(--tg); color:white; border:2px solid var(--tg-dark); border-radius:12px; padding:32px; flex:1; display:flex; flex-direction:column; gap:16px;\">\n          <div class=\"mono\" style=\"font-size:24px; opacity:0.85;\">stage 3<\u002Fdiv>\n          <h3 class=\"body\" style=\"font-size:28px; font-weight:600; color:white;\">Medium prod<\u002Fh3>\n          <div style=\"font-size:var(--type-small); color:rgba(255,255,255,0.9); line-height:1.35;\">Webhook · FastAPI · 2-3 інстанси · Postgres + Redis<\u002Fdiv>\n          <div class=\"mono\" style=\"margin-top:auto; font-size:24px; opacity:0.85;\">10k–100k<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column;\">\n        <div style=\"background:var(--ink); color:white; border:2px solid var(--ink); border-radius:12px; padding:32px; flex:1; display:flex; flex-direction:column; gap:16px;\">\n          <div class=\"mono\" style=\"font-size:24px; opacity:0.7;\">stage 4<\u002Fdiv>\n          <h3 class=\"body\" style=\"font-size:28px; font-weight:600; color:white;\">Large scale<\u002Fh3>\n          <div style=\"font-size:var(--type-small); color:rgba(255,255,255,0.85); line-height:1.35;\">K8s · Redis Cluster · Celery · моніторинг<\u002Fdiv>\n          <div class=\"mono\" style=\"margin-top:auto; font-size:24px; opacity:0.7;\">100k+<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 19 — KEY TAKEAWAYS ============ -->\n  <section data-label=\"19 Takeaways\">\n    <div class=\"slide-title-row\">\n      <span class=\"num\">19<\u002Fspan>\n      <h2 class=\"h1\">Ключові висновки<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center; gap:36px;\">\n      <div style=\"display:flex; gap:32px; align-items:baseline;\">\n        <span class=\"mono\" style=\"font-size:48px; color:var(--tg); min-width:80px; font-weight:600;\">01<\u002Fspan>\n        <p class=\"body\" style=\"font-size:36px; line-height:1.3;\">\n          Бот = звичайний backend. Telegram-сервери — посередник через HTTPS Bot API.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:32px; align-items:baseline;\">\n        <span class=\"mono\" style=\"font-size:48px; color:var(--tg); min-width:80px; font-weight:600;\">02<\u002Fspan>\n        <p class=\"body\" style=\"font-size:36px; line-height:1.3;\">\n          Update — JSON-конверт події. Polling для dev, webhook для production.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:32px; align-items:baseline;\">\n        <span class=\"mono\" style=\"font-size:48px; color:var(--tg); min-width:80px; font-weight:600;\">03<\u002Fspan>\n        <p class=\"body\" style=\"font-size:36px; line-height:1.3;\">\n          Dispatcher → Router → Filter → Handler. Перший збіг виграє — порядок критичний.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:32px; align-items:baseline;\">\n        <span class=\"mono\" style=\"font-size:48px; color:var(--tg); min-width:80px; font-weight:600;\">04<\u002Fspan>\n        <p class=\"body\" style=\"font-size:36px; line-height:1.3;\">\n          Asyncio — основа. Один процес обслуговує тисячі — за умови, що ніщо не блокує Event Loop.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:32px; align-items:baseline;\">\n        <span class=\"mono\" style=\"font-size:48px; color:var(--tg); min-width:80px; font-weight:600;\">05<\u002Fspan>\n        <p class=\"body\" style=\"font-size:36px; line-height:1.3;\">\n          FSM зберігає контекст діалогу. Багатокрокові форми без неї неможливі.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 20 — END ============ -->\n  <section data-label=\"20 End\" data-deck-last-visible=\"\">\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center; gap:48px;\">\n      <div class=\"eyebrow\">Урок 46 · Telegram Bot API<\u002Fdiv>\n      <h1 class=\"title-main\" style=\"font-size:160px;\">\n        Питання?\n      <\u002Fh1>\n      <p class=\"subtitle\" style=\"font-size:48px; max-width:1300px;\">\n        Далі — практика: пишемо echo-бота на <span class=\"mono accent\">aiogram&nbsp;3.x<\u002Fspan>, реєструємо у <span class=\"mono accent\">@BotFather<\u002Fspan>, запускаємо polling.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end;\">\n      <div class=\"small muted\">\n        Матеріали уроку: <span class=\"mono\">README.md<\u002Fspan> · <span class=\"mono\">ARCHITECTURE.md<\u002Fspan> · <span class=\"mono\">lesson_documentation.md<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"title-mark\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n\n\n<\u002Fbody><\u002Fhtml>"
